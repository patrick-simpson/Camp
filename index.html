<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camp Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── PIN LOCK SCREEN ─────────────────────────────────── -->
  <div id="lock-screen" class="lock-screen" hidden>
    <div class="lock-box">
      <div class="lock-logo"><span>🏅</span> Camp Scoreboard</div>
      <p class="lock-prompt">Enter PIN to continue</p>
      <div class="pin-dots" id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <p class="lock-error" id="lock-error" hidden>Wrong PIN — try again</p>
      <div class="keypad" id="keypad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key key-blank" disabled></button>
        <button class="key" data-key="0">0</button>
        <button class="key key-del" data-key="del">⌫</button>
      </div>
    </div>
  </div>

  <div id="app" hidden>

    <header class="app-header">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      <button id="sound-toggle" class="theme-toggle sound-toggle" aria-label="Toggle sounds" title="Toggle sounds">🔊</button>
      <div class="app-logo"><span>🏅</span> Camp Scoreboard</div>
    </header>

    <main class="main-wrap">

      <!-- ── DAY TABS ───────────────────────────────────── -->
      <nav id="day-tabs" class="day-tabs" aria-label="Day of the week"></nav>
      <p id="day-note" class="day-note" hidden></p>

      <!-- ── GAME LIST (home) ───────────────────────────── -->
      <section id="game-list"></section>

      <!-- ── GAME VIEW (detail) ─────────────────────────── -->
      <section id="game-view" class="card game-view" hidden></section>

      <!-- ── WEEK STANDINGS ─────────────────────────────── -->
      <section class="card standings-card">
        <div class="card-header-row">
          <h2>Week Medal Count</h2>
          <button id="reset-week-btn" class="link-btn danger-link">New week (reset)</button>
        </div>
        <p class="muted standings-hint">Only counts games saved in this app — your paper scoreboard is the official one.</p>
        <div class="standings-actions">
          <button id="copy-standings-btn" class="secondary-btn">📋 Copy scores &amp; medals</button>
          <button id="share-standings-btn" class="secondary-btn" hidden>📤 Share</button>
        </div>
        <div class="table-scroll">
          <table id="standings-table" class="standings-table">
            <thead>
              <tr>
                <th class="rank-col">#</th>
                <th>Team</th>
                <th class="medal-col">🥇</th>
                <th class="medal-col">🥈</th>
                <th class="medal-col">🥉</th>
              </tr>
            </thead>
            <tbody id="standings-tbody"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Current Standings</title>
  <meta name="description" content="Live camp standings — the big reveal.">
  <meta name="theme-color" content="#ff4d8d">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg-1: #ff8a3d;
      --bg-2: #ff4d8d;
      --bg-3: #7b5bff;
      --ink: #12061f;
      --gold: #ffd34d;
      --card: rgba(255,255,255,0.14);
      --card-line: rgba(255,255,255,0.35);
      --sans: 'Baloo 2', 'Fredoka', 'Nunito', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color: #fff;
      font-family: var(--sans);
      background: var(--ink);
      -webkit-user-select: none; user-select: none;
    }
    body {
      height: 100dvh;
      background:
        radial-gradient(1200px 800px at 15% -10%, rgba(255,255,255,0.18), transparent 60%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
      background-size: 200% 200%;
      animation: bgshift 18s ease-in-out infinite;
    }
    @keyframes bgshift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    /* ── Confetti canvas ─────────────────────────────────── */
    #confetti { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Top bar ─────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      display: flex; align-items: center; gap: 0.5rem;
      padding: max(0.6rem, env(safe-area-inset-top)) 0.9rem 0.6rem;
      pointer-events: none;
    }
    .topbar a, .topbar button { pointer-events: auto; }
    .chip {
      appearance: none; border: 1px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.18); color: #fff; font: inherit;
      font-size: 0.85rem; font-weight: 700; padding: 0.4rem 0.8rem;
      border-radius: 999px; text-decoration: none; cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .chip:hover { background: rgba(0,0,0,0.3); }
    .chip.spacer { margin-left: auto; }
    .hint {
      position: fixed; left: 0; right: 0; bottom: 0.7rem; z-index: 40;
      text-align: center; font-size: 0.9rem; font-weight: 700;
      color: rgba(255,255,255,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.35);
      pointer-events: none; transition: opacity 0.3s;
    }

    /* ── Screen layout ───────────────────────────────────── */
    #screen { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 30; display: flex;
      align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
      font-size: 1.4rem; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .spin { font-size: 3rem; animation: spin 1.1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Intro ───────────────────────────────────────────── */
    #intro {
      position: absolute; inset: 0; z-index: 25; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 1.2rem; padding: 2rem;
    }
    #intro.hide { opacity: 0; transform: scale(1.08); pointer-events: none; transition: opacity 0.5s, transform 0.5s; }
    .intro-kicker { font-size: clamp(1rem, 3vw, 1.6rem); font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; opacity: 0; animation: popIn 0.6s 0.1s forwards; }
    .intro-title {
      margin: 0; line-height: 0.95; font-weight: 900;
      font-size: clamp(2.6rem, 12vw, 9rem); letter-spacing: -1px;
      text-shadow: 0 6px 0 rgba(0,0,0,0.18), 0 14px 40px rgba(0,0,0,0.35);
    }
    .intro-title .word { display: inline-block; white-space: nowrap; }
    .intro-title .word span { display: inline-block; opacity: 0; transform: translateY(40px) rotate(-6deg);
      animation: dropBounce 0.7s forwards; }
    .intro-shields { display: flex; gap: clamp(0.4rem, 2vw, 1.4rem); flex-wrap: wrap; justify-content: center; margin-top: 0.4rem; }
    .intro-shields img { width: clamp(46px, 9vw, 104px); height: auto; opacity: 0;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.35)); animation: floatIn 0.8s forwards, bob 3s ease-in-out infinite; }
    .intro-go { margin-top: 0.6rem; font-size: clamp(1rem, 3.2vw, 1.7rem); font-weight: 800;
      opacity: 0; animation: popIn 0.5s 1.4s forwards, pulse 1.6s 1.6s ease-in-out infinite; }
    @keyframes dropBounce { 0% { opacity: 0; transform: translateY(-60px) rotate(-8deg); } 60% { opacity: 1; transform: translateY(10px) rotate(2deg); } 100% { opacity: 1; transform: translateY(0) rotate(0); } }
    @keyframes floatIn { from { opacity: 0; transform: translateY(30px) scale(0.6); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    /* ── Hero (big reveal) ───────────────────────────────── */
    #hero-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 4rem 1rem 1rem; min-height: 0; }
    .hero {
      display: flex; flex-direction: column; align-items: center; gap: clamp(0.4rem, 1.4vh, 1rem);
      width: 100%; max-width: 1400px;
      transition: transform 0.45s cubic-bezier(.5,-0.2,.3,1.4), opacity 0.4s;
    }
    .hero.enter { animation: heroIn 0.55s cubic-bezier(.2,.9,.3,1.3); }
    .hero.dock { transform: translateY(46vh) scale(0.18); opacity: 0; }
    @keyframes heroIn { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .hero-place {
      font-size: clamp(1.6rem, 6vw, 4rem); font-weight: 900; letter-spacing: 1px;
      text-transform: uppercase; text-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 10px 30px rgba(0,0,0,0.35);
    }
    .hero-place .tie { font-size: 0.5em; vertical-align: middle; margin-left: 0.5rem;
      background: rgba(0,0,0,0.25); padding: 0.15em 0.6em; border-radius: 999px; }
    .hero-entries { display: flex; gap: clamp(1rem, 4vw, 4rem); align-items: stretch; justify-content: center; flex-wrap: wrap; }
    .hero-entry { display: flex; flex-direction: column; align-items: center; gap: clamp(0.3rem, 1vh, 0.8rem); }
    .hero-shield { width: clamp(140px, 26vh, 340px); height: auto; filter: drop-shadow(0 14px 26px rgba(0,0,0,0.4)); animation: bob 3.4s ease-in-out infinite; }
    .hero-emoji { font-size: clamp(2rem, 7vh, 4.5rem); line-height: 1; margin-top: -0.4em; }
    .hero-name { font-size: clamp(1.4rem, 5vw, 3.4rem); font-weight: 900; text-align: center;
      text-shadow: 0 3px 0 rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.3); }
    /* two-beat flip: points then breakdown */
    .hero-stats { position: relative; height: clamp(3.4rem, 11vh, 7rem); width: min(92vw, 640px); }
    .hero-points, .hero-break {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: transform 0.5s cubic-bezier(.3,.7,.3,1), opacity 0.45s;
    }
    .hero-points .num { font-size: clamp(3rem, 13vh, 8rem); font-weight: 900; line-height: 0.9;
      color: var(--gold); text-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 12px 34px rgba(0,0,0,0.4); }
    .hero-points .lbl { font-size: clamp(0.9rem, 3vw, 1.6rem); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
    .hero-break { transform: translateY(28px); opacity: 0; }
    .hero-break .medals { display: flex; gap: clamp(0.7rem, 3vw, 2rem); font-size: clamp(1.3rem, 5vw, 3rem); font-weight: 900; }
    .hero-break .bonus { margin-top: 0.3rem; font-size: clamp(1rem, 3.2vw, 1.7rem); font-weight: 800; color: var(--gold); }
    .hero.beat2 .hero-points { transform: translateY(-30px); opacity: 0; }
    .hero.beat2 .hero-break { transform: translateY(0); opacity: 1; }

    /* ── Standings board (grows) ─────────────────────────── */
    #board {
      position: relative; z-index: 22; margin: 0 auto; width: min(96vw, 1200px);
      padding: 0 0.6rem calc(2.2rem + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: clamp(0.3rem, 0.9vh, 0.7rem);
      transition: all 0.4s;
    }
    #board.final { flex: 1; justify-content: center; padding-top: 4.5rem; }
    .row {
      display: grid; grid-template-columns: clamp(2.6rem,7vw,4.2rem) 1fr auto;
      align-items: center; gap: clamp(0.5rem, 2vw, 1.4rem);
      background: var(--card); border: 1px solid var(--card-line);
      border-radius: 16px; padding: clamp(0.4rem, 1.3vh, 0.9rem) clamp(0.7rem, 2vw, 1.3rem);
      backdrop-filter: blur(4px);
      animation: rowPop 0.45s cubic-bezier(.2,.9,.3,1.35);
    }
    @keyframes rowPop { from { opacity: 0; transform: translateY(-24px) scale(0.9); } to { opacity: 1; transform: none; } }
    .row.p1 { background: linear-gradient(100deg, rgba(255,211,77,0.4), rgba(255,255,255,0.12)); border-color: var(--gold); box-shadow: 0 8px 30px rgba(255,211,77,0.3); }
    .row.p2 { background: linear-gradient(100deg, rgba(226,232,240,0.35), rgba(255,255,255,0.1)); }
    .row.p3 { background: linear-gradient(100deg, rgba(205,127,50,0.35), rgba(255,255,255,0.1)); }
    .row .rank { font-size: clamp(1.2rem, 3.4vw, 2.2rem); font-weight: 900; text-align: center; }
    .row .who { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
    .row .who .em { font-size: clamp(1.3rem, 3.6vw, 2.2rem); }
    .row .who .nm { font-size: clamp(1rem, 3vw, 1.9rem); font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row .score { display: flex; align-items: center; gap: clamp(0.4rem, 1.6vw, 1.1rem); }
    .row .pts { font-size: clamp(1.3rem, 4vw, 2.4rem); font-weight: 900; color: var(--gold); }
    .row .pts small { font-size: 0.45em; font-weight: 800; color: rgba(255,255,255,0.8); margin-left: 0.15em; }
    .row .med { font-size: clamp(0.8rem, 2.4vw, 1.3rem); font-weight: 800; white-space: nowrap; opacity: 0.95; }

    /* ── Champion finale banner ──────────────────────────── */
    #finale {
      position: fixed; inset: 0; z-index: 35; display: none;
      flex-direction: column; align-items: center; justify-content: flex-start;
      padding-top: clamp(1.2rem, 4vh, 3rem); pointer-events: none;
    }
    #finale.show { display: flex; }
    .champ {
      text-align: center; animation: champIn 0.8s cubic-bezier(.2,.9,.3,1.4);
      text-shadow: 0 3px 14px rgba(0,0,0,0.5);
    }
    .champ .crown { font-size: clamp(2.2rem, 8vh, 5rem); animation: bob 2.4s ease-in-out infinite; }
    .champ .lead { font-size: clamp(0.9rem, 3vw, 1.7rem); font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
    .champ .name { font-size: clamp(1.8rem, 7vw, 4.4rem); font-weight: 900; line-height: 1.02;
      text-shadow: 0 5px 0 rgba(0,0,0,0.25), 0 14px 40px rgba(0,0,0,0.5); }
    .champ .pts { font-size: clamp(1.2rem, 4.4vw, 2.6rem); font-weight: 900; color: var(--gold); }
    @keyframes champIn { from { opacity: 0; transform: scale(0.5) translateY(-40px); } to { opacity: 1; transform: none; } }

    .fade-out { opacity: 0 !important; transition: opacity 0.35s; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="topbar">
    <a class="chip" href="stalling.html">← Back</a>
    <button class="chip spacer" id="sound-btn" aria-pressed="true" title="Toggle sound">🔊 Sound</button>
  </div>

  <div id="loading"><span class="spin">🎪</span><span>Loading standings…</span></div>

  <div id="screen" hidden>
    <!-- Intro -->
    <div id="intro">
      <p class="intro-kicker">🏕️ Camp Scoreboard presents</p>
      <h1 class="intro-title" id="intro-title"></h1>
      <div class="intro-shields" id="intro-shields"></div>
      <p class="intro-go">Press → or tap to begin ▶</p>
    </div>

    <!-- Hero reveal -->
    <div id="hero-wrap"></div>

    <!-- Growing standings board -->
    <div id="board"></div>
  </div>

  <!-- Finale -->
  <div id="finale"><div class="champ" id="champ"></div></div>

  <p class="hint" id="hint" style="opacity:0"></p>

  <!-- Firebase (optional live sync — same feed as the main app) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js?v=85"></script>
  <script>
  (function () {
    'use strict';

    // ── Constants mirrored from app.js (keep in sync) ──────────────
    var STORAGE_KEY = 'campScoreboardV2';
    var MEDAL_POINTS = { gold: 7, silver: 5, bronze: 3 };
    var DEFAULT_TEAM_NAMES = [
      'Ferocious Foxes', 'Turkey Dinner', 'Methodic Mediocre Maples',
      'Particularly Perilous Pumpkins', 'Patriotic Pilgrims', 'Runaway John Deersz'
    ];
    var TEAM_EMOJI = { t0: '🦊', t1: '🦃', t2: '🍁', t3: '🎃', t4: '🦅', t5: '🚜' };
    var TEAM_SHIELD = {
      t0: 'images/team-shields/ferocious-foxes.webp?v=2',
      t1: 'images/team-shields/turkey-dinner.webp?v=2',
      t2: 'images/team-shields/methodic-mediocre-maples.webp?v=2',
      t3: 'images/team-shields/particularly-perilous-pumpkins.webp?v=2',
      t4: 'images/team-shields/patriotic-pilgrims.webp?v=4',
      t5: 'images/team-shields/runaway-john-deeres.webp?v=2'
    };
    // messtival:true games in app.js — worth DOUBLE points (Friday). Keep in sync.
    var MESSTIVAL_GAME_IDS = ['bushel-bustle', 'pumpkin-patch-plunder', 'bob-drop-roll', 'cider-survivor'];

    var params = new URLSearchParams(location.search);
    var DEMO = params.has('demo');
    var FORCE_FINALE = params.has('finale');

    // ── Helpers ────────────────────────────────────────────────────
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function ordinal(n) {
      var s = ['th', 'st', 'nd', 'rd'], v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function isFridayEastern() {
      if (FORCE_FINALE) return true;
      try {
        var wd = new Intl.DateTimeFormat('en-US', { weekday: 'short', timeZone: 'America/New_York' }).format(new Date());
        return wd === 'Fri';
      } catch (e) { return new Date().getDay() === 5; }
    }
    function teamEmoji(id) { return TEAM_EMOJI[id] || '🏕️'; }

    // Coerce a synced teams value (array, or RTDB object) into an array of
    // {id, name}. RTDB can prune/normalize; fall back to the default roster.
    function normalizeTeams(raw) {
      var arr = [];
      if (Array.isArray(raw)) arr = raw.slice();
      else if (raw && typeof raw === 'object') arr = Object.keys(raw).sort().map(function (k) { return raw[k]; });
      arr = arr.filter(Boolean);
      if (!arr.length) {
        arr = DEFAULT_TEAM_NAMES.map(function (name, i) { return { id: 't' + i, name: name }; });
      }
      return arr.map(function (t, i) {
        return { id: t.id || ('t' + i), name: (t.name || DEFAULT_TEAM_NAMES[i] || ('Team ' + (i + 1))) };
      });
    }

    // Replicates app.js medalCounts + bonusBreakdown + rankTeamsByPoints.
    function computeStandings(state) {
      state = state || {};
      var teams = normalizeTeams(state.teams);
      var results = state.results || {};
      var bonuses = state.bonuses || {};
      var counts = {};
      teams.forEach(function (t) {
        counts[t.id] = { gold: 0, silver: 0, bronze: 0, medalPts: 0, verse: 0, meals: 0, custom: 0, bonus: 0, points: 0 };
      });
      Object.keys(results).forEach(function (id) {
        var r = results[id];
        if (!r || !r.medals) return;
        var mult = MESSTIVAL_GAME_IDS.indexOf(id) >= 0 ? 2 : 1;
        var m = r.medals;
        if (counts[m.gold]) { counts[m.gold].gold += 1; counts[m.gold].medalPts += MEDAL_POINTS.gold * mult; }
        if (counts[m.silver]) { counts[m.silver].silver += 1; counts[m.silver].medalPts += MEDAL_POINTS.silver * mult; }
        if (counts[m.bronze]) { counts[m.bronze].bronze += 1; counts[m.bronze].medalPts += MEDAL_POINTS.bronze * mult; }
      });
      Object.keys(bonuses).forEach(function (k) {
        var b = bonuses[k];
        if (!b || !counts[b.teamId]) return;
        var p = Number(b.points);
        if (isNaN(p)) return;
        var bucket = b.category === 'verse' ? 'verse' : b.category === 'cleanup' ? 'meals' : 'custom';
        counts[b.teamId][bucket] += p;
      });
      teams.forEach(function (t) {
        var c = counts[t.id];
        c.bonus = c.verse + c.meals + c.custom;
        c.points = c.medalPts + c.bonus;
      });
      var ranked = teams.slice().sort(function (a, b) {
        var sa = counts[a.id], sb = counts[b.id];
        if (sb.points !== sa.points) return sb.points - sa.points;
        if (sb.gold !== sa.gold) return sb.gold - sa.gold;
        if (sb.silver !== sa.silver) return sb.silver - sa.silver;
        return sb.bronze - sa.bronze;
      });
      return ranked.map(function (t) { return { team: t, stats: counts[t.id] }; });
    }

    // Group by equal total points (competition ranking → ties share a place).
    function groupPlaces(ranked) {
      var groups = [], i = 0;
      while (i < ranked.length) {
        var pts = ranked[i].stats.points, entries = [ranked[i]], j = i + 1;
        while (j < ranked.length && ranked[j].stats.points === pts) { entries.push(ranked[j]); j++; }
        groups.push({ place: i + 1, entries: entries });
        i = j;
      }
      return groups;
    }

    // ── Confetti (hand-rolled emoji cannons — no external lib) ──────
    var cvs = document.getElementById('confetti');
    var ctx = cvs.getContext('2d');
    var parts = [];
    var streamEmojis = null; // active light stream while a hero is shown
    var lastStream = 0;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    function resize() {
      cvs.width = Math.floor(innerWidth * dpr);
      cvs.height = Math.floor(innerHeight * dpr);
      cvs.style.width = innerWidth + 'px';
      cvs.style.height = innerHeight + 'px';
    }
    window.addEventListener('resize', resize);
    resize();

    function launch(emoji, x, y, vx, vy, size) {
      parts.push({ e: emoji, x: x, y: y, vx: vx, vy: vy, size: size,
        rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.3 });
    }
    // Fire from both bottom corners toward the upper-middle.
    function cannon(emojis, count, power) {
      if (!emojis || !emojis.length) return;
      var W = cvs.width, H = cvs.height;
      for (var side = 0; side < 2; side++) {
        var baseX = side === 0 ? W * 0.04 : W * 0.96;
        for (var i = 0; i < count; i++) {
          var e = emojis[i % emojis.length];
          var toCenter = side === 0 ? 1 : -1;
          var vx = toCenter * (0.6 + Math.random() * 0.9) * power;
          var vy = -(1.4 + Math.random() * 0.9) * power;
          var size = (34 + Math.random() * 44) * dpr;
          launch(e, baseX, H * 0.99, vx, vy, size);
        }
      }
    }
    function tick() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      var g = 0.16 * dpr;
      // light continuous stream while a hero is up
      if (streamEmojis) {
        var now = performance.now();
        if (now - lastStream > 220) { lastStream = now; cannon(streamEmojis, 1, 9 * dpr); }
      }
      for (var i = parts.length - 1; i >= 0; i--) {
        var p = parts[i];
        p.vy += g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        if (p.y > cvs.height + 80 * dpr || p.x < -120 * dpr || p.x > cvs.width + 120 * dpr) {
          parts.splice(i, 1); continue;
        }
        ctx.save();
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.font = p.size + 'px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.e, 0, 0);
        ctx.restore();
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ── Sound (tiny WebAudio synth; gated on first interaction) ─────
    var audio = null, muted = false;
    function ensureAudio() {
      if (audio || muted) return;
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audio = null; }
    }
    function beep(freq, dur, when, type, vol) {
      if (!audio || muted) return;
      var o = audio.createOscillator(), g = audio.createGain();
      o.type = type || 'triangle'; o.frequency.value = freq;
      var t = audio.currentTime + (when || 0);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol || 0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(audio.destination);
      o.start(t); o.stop(t + dur + 0.02);
    }
    function sfxReveal() { ensureAudio(); beep(523, 0.14, 0); beep(784, 0.18, 0.09); }
    function sfxBreak() { ensureAudio(); beep(988, 0.16, 0, 'sine', 0.2); }
    function sfxFanfare() {
      ensureAudio();
      [523, 659, 784, 1047].forEach(function (f, i) { beep(f, 0.28, i * 0.13, 'triangle', 0.28); });
    }
    var soundBtn = document.getElementById('sound-btn');
    soundBtn.addEventListener('click', function () {
      muted = !muted;
      soundBtn.setAttribute('aria-pressed', String(!muted));
      soundBtn.textContent = muted ? '🔇 Muted' : '🔊 Sound';
      if (!muted) ensureAudio();
    });

    // ── Data loading ───────────────────────────────────────────────
    var liveGroups = null;       // latest live standings (used on intro)
    var haveData = false;

    function demoState() {
      return {
        teams: DEFAULT_TEAM_NAMES.map(function (n, i) { return { id: 't' + i, name: n }; }),
        results: {
          'demo-a': { medals: { gold: 't0', silver: 't1', bronze: 't2' } },
          'demo-b': { medals: { gold: 't0', silver: 't2', bronze: 't3' } },
          'demo-c': { medals: { gold: 't4', silver: 't0', bronze: 't1' } },
          'demo-d': { medals: { gold: 't3', silver: 't4', bronze: 't5' } },
          'demo-e': { medals: { gold: 't1', silver: 't5', bronze: 't4' } }
        },
        bonuses: {
          b1: { teamId: 't0', points: 5, category: 'verse' },
          b2: { teamId: 't2', points: 5, category: 'cleanup' },
          b3: { teamId: 't5', points: -3, category: 'custom' }
        }
      };
    }
    function readLocal() {
      try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
      catch (e) { return null; }
    }
    function ingest(state) {
      liveGroups = groupPlaces(computeStandings(state));
      if (!haveData) { haveData = true; onDataReady(); }
    }

    function startData() {
      if (DEMO) { ingest(demoState()); return; }
      var cfg = window.FIREBASE_CONFIG;
      var gotRemote = false;
      if (cfg && cfg.apiKey && cfg.databaseURL && typeof firebase !== 'undefined') {
        try {
          firebase.initializeApp(cfg);
          firebase.database().ref('campScoreboard/state').on('value', function (snap) {
            var remote = snap.val();
            if (remote) { gotRemote = true; ingest(remote); }
          });
        } catch (e) { /* fall through to local */ }
      }
      // Fallback: if no remote arrives quickly, use local snapshot.
      setTimeout(function () {
        if (!gotRemote && !haveData) {
          var local = readLocal();
          ingest(local || demoState());
        }
      }, 3500);
    }

    // ── UI: intro ──────────────────────────────────────────────────
    var loadingEl = document.getElementById('loading');
    var screenEl = document.getElementById('screen');
    var introEl = document.getElementById('intro');
    var heroWrap = document.getElementById('hero-wrap');
    var boardEl = document.getElementById('board');
    var hintEl = document.getElementById('hint');
    var finaleEl = document.getElementById('finale');

    function buildIntro() {
      var words = ['CURRENT', 'STANDINGS'];
      var i = 0;
      // Wrap each word so it never splits mid-word when the line wraps;
      // letters still drop in one by one.
      introEl.querySelector('#intro-title').innerHTML = words.map(function (word) {
        var letters = word.split('').map(function (ch) {
          return '<span style="animation-delay:' + (0.15 + (i++) * 0.045).toFixed(2) + 's">' + esc(ch) + '</span>';
        }).join('');
        return '<span class="word">' + letters + '</span>';
      }).join(' ');
      var sh = introEl.querySelector('#intro-shields');
      sh.innerHTML = ['t0', 't1', 't2', 't3', 't4', 't5'].map(function (id, i) {
        return '<img src="' + TEAM_SHIELD[id] + '" alt="" style="animation-delay:' + (0.5 + i * 0.12).toFixed(2) + 's, ' + (1.2 + i * 0.2).toFixed(2) + 's">';
      }).join('');
    }

    function onDataReady() {
      loadingEl.style.display = 'none';
      screenEl.hidden = false;
      buildIntro();
      // A little celebratory sparkle on the intro.
      var mix = ['t0', 't1', 't2', 't3', 't4', 't5'].map(teamEmoji);
      setTimeout(function () { cannon(mix, 2, 10 * dpr); }, 700);
      showHint('Press → or tap to start the reveal');
    }

    var hintTimer = null;
    function showHint(text, persist) {
      hintEl.textContent = text;
      hintEl.style.opacity = '1';
      clearTimeout(hintTimer);
      if (!persist) hintTimer = setTimeout(function () { hintEl.style.opacity = '0'; }, 3200);
    }

    // ── Reveal state machine ───────────────────────────────────────
    var phase = 'intro';   // 'intro' | 'reveal' | 'done'
    var order = [];        // reveal order: lowest place first (6th → 1st)
    var bigIndex = -1;     // index in `order` currently shown big, or -1
    var dockedCount = 0;   // number of groups already docked into the board
    var autoTimer = null, beatTimer = null;

    function medalStr(s) {
      return '🥇 ' + s.gold + '   🥈 ' + s.silver + '   🥉 ' + s.bronze;
    }
    function bonusStr(s) {
      if (!s.bonus) return '';
      var bits = [];
      if (s.verse) bits.push((s.verse > 0 ? '+' : '') + s.verse + ' verse');
      if (s.meals) bits.push((s.meals > 0 ? '+' : '') + s.meals + ' meals');
      if (s.custom) bits.push((s.custom > 0 ? '+' : '') + s.custom + ' bonus');
      return (s.bonus > 0 ? '+' : '') + s.bonus + ' pts' + (bits.length ? ' (' + bits.join(', ') + ')' : '');
    }

    function clearTimers() { clearTimeout(autoTimer); clearTimeout(beatTimer); }

    function showBig(orderIdx) {
      clearTimers();
      bigIndex = orderIdx;
      var group = order[orderIdx];
      var tie = group.entries.length > 1;
      var html = '<div class="hero">';
      html += '<div class="hero-place">' + esc(ordinal(group.place)) + (tie ? '<span class="tie">TIE</span>' : '') + '</div>';
      html += '<div class="hero-entries">';
      group.entries.forEach(function (en) {
        var id = en.team.id, s = en.stats;
        var shield = TEAM_SHIELD[id];
        html += '<div class="hero-entry">';
        html += shield ? '<img class="hero-shield" src="' + shield + '" alt="">' : '';
        html += '<div class="hero-emoji">' + teamEmoji(id) + '</div>';
        html += '<div class="hero-name">' + esc(en.team.name) + '</div>';
        html += '<div class="hero-stats">';
        html += '  <div class="hero-points"><span class="num">' + s.points + '</span><span class="lbl">points</span></div>';
        html += '  <div class="hero-break"><div class="medals">' + medalStr(s) + '</div>' +
                (bonusStr(s) ? '<div class="bonus">' + esc(bonusStr(s)) + '</div>' : '') + '</div>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div></div>';
      heroWrap.innerHTML = html;
      var hero = heroWrap.querySelector('.hero');
      hero.classList.add('enter');

      // confetti: fire the team mascot(s), then keep a light stream.
      var emojis = group.entries.map(function (en) { return teamEmoji(en.team.id); });
      cannon(emojis, 8, 11 * dpr);
      streamEmojis = emojis;
      sfxReveal();

      // beat 2: slide points out, medals + bonus in.
      beatTimer = setTimeout(function () { hero.classList.add('beat2'); sfxBreak(); }, 1700);
      // auto-shrink into the table after ~5s (presenter can skip with →).
      // If this was the last place, waiting it out rolls into the finale too.
      var wasLast = orderIdx === order.length - 1;
      autoTimer = setTimeout(function () { dockCurrent(); if (wasLast) finish(); }, 5000);

      showHint(orderIdx === 0 ? 'Press → for the next place' : (orderIdx === order.length - 1 ? 'Press → to finish' : 'Press → next  ·  ← back'));
    }

    function dockCurrent() {
      if (bigIndex < 0) return;
      clearTimers();
      streamEmojis = null;
      var hero = heroWrap.querySelector('.hero');
      var idx = bigIndex;
      bigIndex = -1;
      if (hero) {
        hero.classList.add('dock');
        setTimeout(function () {
          if (heroWrap.querySelector('.hero') === hero) heroWrap.innerHTML = '';
        }, 460);
      }
      dockedCount = idx + 1;
      renderBoardRows();
    }

    // Board holds docked groups; higher place on top (prepend as we go up).
    function renderBoardRows() {
      var rows = [];
      for (var i = 0; i < dockedCount; i++) {
        var group = order[i];
        group.entries.forEach(function (en) {
          var s = en.stats, id = en.team.id;
          var pcls = group.place <= 3 ? ' p' + group.place : '';
          rows.push(
            '<div class="row' + pcls + '">' +
              '<div class="rank">' + esc(ordinal(group.place)) + '</div>' +
              '<div class="who"><span class="em">' + teamEmoji(id) + '</span><span class="nm">' + esc(en.team.name) + '</span></div>' +
              '<div class="score"><span class="pts">' + s.points + '<small>pts</small></span>' +
                '<span class="med">' + medalStr(s) + '</span></div>' +
            '</div>'
          );
        });
      }
      // order[] is lowest-place-first; reverse so 1st ends on top.
      boardEl.innerHTML = rows.reverse().join('');
    }

    function beginReveal() {
      if (phase !== 'intro') return;
      phase = 'reveal';
      // Freeze the standings at the moment the reveal starts.
      order = (liveGroups || []).slice().reverse(); // lowest place first
      introEl.classList.add('hide');
      setTimeout(function () { introEl.style.display = 'none'; }, 520);
      dockedCount = 0;
      showBig(0);
    }

    function advance() {
      if (phase === 'intro') { beginReveal(); return; }
      if (phase !== 'reveal') return;
      if (bigIndex >= 0) {
        var wasLast = bigIndex === order.length - 1;
        dockCurrent();
        if (wasLast) { finish(); return; }
        showBig(dockedCount);
      } else {
        if (dockedCount < order.length) showBig(dockedCount);
        else finish();
      }
    }

    function back() {
      if (phase === 'done') {
        // Re-enter the reveal at 1st place to review the countdown backwards.
        phase = 'reveal';
        boardEl.classList.remove('final');
        heroWrap.style.display = '';
        finaleEl.classList.remove('show');
        if (finaleIv) { clearInterval(finaleIv); finaleIv = null; }
        var last = order.length - 1;
        dockedCount = last;
        renderBoardRows();
        showBig(last);
        return;
      }
      if (phase !== 'reveal') return;
      var target;
      if (bigIndex >= 0) target = bigIndex - 1;
      else target = dockedCount - 1;
      if (target < 0) return; // already at the first-revealed place
      clearTimers();
      dockedCount = target;
      renderBoardRows();
      showBig(target);
    }

    function finish() {
      if (phase === 'done') return;
      phase = 'done';
      clearTimers();
      streamEmojis = null;
      bigIndex = -1;
      dockedCount = order.length;
      renderBoardRows();
      var champGroup = order[order.length - 1]; // first place
      if (isFridayEastern() && champGroup) {
        // Keep the hero area (empty) so the board stays pinned to the bottom;
        // the champion banner fills the cleared top space above it.
        heroWrap.innerHTML = '';
        heroWrap.style.display = '';
        boardEl.classList.remove('final');
        runFinale(champGroup);
        showHint('🎉 Champions! Press ← to review', true);
      } else {
        // Quiet end: center the full standings table on screen.
        heroWrap.innerHTML = '';
        heroWrap.style.display = 'none';
        boardEl.classList.add('final');
        showHint('Final standings  ·  Press ← to review');
      }
    }

    var finaleIv = null;
    function runFinale(group) {
      var names = group.entries.map(function (en) { return esc(en.team.name); }).join(' & ');
      var pts = group.entries[0].stats.points;
      var emojis = group.entries.map(function (en) { return teamEmoji(en.team.id); });
      document.getElementById('champ').innerHTML =
        '<div class="crown">👑</div>' +
        '<div class="lead">Camp Champions</div>' +
        '<div class="name">' + emojis.join(' ') + ' ' + names + '</div>' +
        '<div class="pts">' + pts + ' points</div>';
      finaleEl.classList.add('show');
      sfxFanfare();
      // Sustained confetti barrage.
      if (finaleIv) clearInterval(finaleIv);
      var bursts = 0;
      finaleIv = setInterval(function () {
        cannon(emojis, 10, 12 * dpr);
        if (++bursts > 24) { clearInterval(finaleIv); finaleIv = null; }
      }, 350);
    }

    // ── Input ──────────────────────────────────────────────────────
    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter' || e.key === 'PageDown') {
        e.preventDefault(); ensureAudio(); advance();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); ensureAudio(); back();
      }
    });
    // Tap / click anywhere (except the top-bar controls) advances.
    document.addEventListener('click', function (e) {
      if (e.target.closest('.topbar')) return;
      ensureAudio(); advance();
    });

    // ── Go ─────────────────────────────────────────────────────────
    startData();
  })();
  </script>
</body>
</html>
